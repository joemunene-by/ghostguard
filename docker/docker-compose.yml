version: "3.8"

services:
  ghostguard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${GHOSTGUARD_PORT:-8000}:8000"
    volumes:
      - ./policy.yaml:/app/policy.yaml:ro
      - ghostguard-data:/app/data
    environment:
      - GHOSTGUARD_UPSTREAM_URL=${GHOSTGUARD_UPSTREAM_URL:-https://api.openai.com}
      - GHOSTGUARD_DASHBOARD_ENABLED=${GHOSTGUARD_DASHBOARD_ENABLED:-true}
      - GHOSTGUARD_LOG_LEVEL=${GHOSTGUARD_LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ghostguard-data:
